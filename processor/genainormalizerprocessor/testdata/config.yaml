# Full config exercising the supported source and its per-source fields.
genainormalizer:
  sources:
    openinference:
      remove_originals: true
      overwrite: false

# Sources omitted entirely: validation error (at least one source required).
genainormalizer/empty:

# Sources explicitly provided with only openinference defaults.
genainormalizer/openinference_only:
  sources:
    openinference: {}

# Explicit empty sources map: validation error.
genainormalizer/empty_sources:
  sources: {}

# Unknown source name: validation error.
genainormalizer/unknown_source:
  sources:
    foobar: {}
